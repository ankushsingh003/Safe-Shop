apiVersion: 1

datasources:
  - name: SafeShop-PostgreSQL
    type: postgres
    url: postgres:5432
    database: ${POSTGRES_DB:-safeshop_orders}
    user: ${POSTGRES_USER:-postgres}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-postgres}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: true
    uid: PostgreSQL