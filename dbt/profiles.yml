
safeshop:
  target: dev
  outputs:

    # ── LOCAL DEVELOPMENT ──────────────────────────────────────────
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'safeshop_orders') }}"
      schema: public
      threads: 4

    # ── PRODUCTION (AWS RDS / Docker) ──────────────────────────────
    prod:
      type: postgres
      host: "{{ env_var('PROD_POSTGRES_HOST') }}"
      port: "{{ env_var('PROD_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('PROD_POSTGRES_USER') }}"
      password: "{{ env_var('PROD_POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('PROD_POSTGRES_DB', 'safeshop_orders') }}"
      schema: public
      threads: 8